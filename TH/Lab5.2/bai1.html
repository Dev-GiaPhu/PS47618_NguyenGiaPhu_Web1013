<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 5.2.1</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: white;
        }

        /* =========================
           CHECKBOX MENU
        ========================= */

        #menu-toggle {
            display: none;
        }

        .menu-button {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1000;

            width: 60px;
            height: 60px;
            background: #eeeeee;
            border-radius: 5px;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 32px;
            cursor: pointer;
            color: #111;
        }

        .close-icon {
            display: none;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;

            width: 350px;
            height: 100vh;
            background: #eeeeee;

            z-index: 999;

            display: none;
            padding-top: 150px;
            padding-left: 45px;
        }

        .nav__list {
            list-style: none;
        }

        .nav__item {
            margin-bottom: 25px;
        }

        .nav__link:link,
        .nav__link:visited {
            display: inline-block;

            text-decoration: none;
            color: #333;

            font-size: 28px;
            font-weight: bold;
            letter-spacing: 8px;

            padding-left: 8px;
            border-left: 4px solid transparent;

            transition: all 0.3s linear;
        }

        .nav__link:hover {
            color: #5a8b32;
            border-left-color: #5a8b32;
            transform: translateX(10%);
        }

        .nav__link:active {
            color: #5a8b32;
            border-left-color: #5a8b32;
            transform: translateX(10%);
        }

        #menu-toggle:checked ~ .nav {
            display: block;
        }

        #menu-toggle:checked + .menu-button .open-icon {
            display: none;
        }

        #menu-toggle:checked + .menu-button .close-icon {
            display: inline-block;
        }

        /* =========================
           HEADER
        ========================= */

        .header {
            min-height: 100vh;

            background-image:
                linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
                url("https://images.unsplash.com/photo-1544787219-7f47ccb76574?auto=format&fit=crop&w=1600&q=80");

            background-size: cover;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;

            text-align: center;
            color: white;

            position: relative;
        }

        .header__text-box {
            width: 90%;
        }

        .heading_first {
            color: #5a8b32;
            font-size: 28px;
            letter-spacing: 10px;
            font-family: cursive;
            margin-bottom: 35px;
        }

        .heading_first-animation {
            animation: slideInRight 5s ease-in-out;
        }

        .heading_primary {
            font-size: 55px;
            letter-spacing: 18px;
            line-height: 1.7;
            margin-bottom: 45px;
        }

        .heading_primary-animation {
            animation: slideInLeft 5s ease-in-out;
        }

        .header__btn:link,
        .header__btn:visited {
            display: inline-block;

            padding: 22px 70px;

            border: 4px solid #5a8b32;
            background: rgba(125, 165, 75, 0.75);

            color: #222;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 10px;

            animation: show 2s 1s linear;
            animation-fill-mode: backwards;

            transition: all 0.3s linear;
        }

        .header__btn:hover {
            background: #5a8b32;
            color: white;
            transform: translateY(-5px);
        }

        .header__btn:active {
            transform: translateY(0);
        }

        /* =========================
           ABOUT IMAGE
        ========================= */

        .about {
            padding: 80px 0;
            background: white;

            display: flex;
            justify-content: center;
        }

        .about_left {
            width: 90%;
            max-width: 700px;

            overflow: hidden;
            border: 10px solid #5a8b32;
            border-radius: 20px;
        }

        .about__img {
            display: block;
            width: 100%;

            transition: all 0.3s linear;
        }

        .about_left:hover .about__img {
            opacity: 0.5;
            transform: scale(1.2);
        }

        /* =========================
           KEYFRAMES
        ========================= */

        @keyframes slideInLeft {
            0% {
                opacity: 0.1;
                transform: translateX(-100%);
            }

            50% {
                opacity: 0.7;
                transform: translateX(25%);
            }

            75% {
                opacity: 0.9;
                transform: translateX(-10%);
            }

            100% {
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            0% {
                opacity: 0.1;
                transform: translateX(100%);
            }

            50% {
                opacity: 0.7;
                transform: translateX(-5%);
            }

            75% {
                opacity: 0.9;
                transform: translateX(10%);
            }

            100% {
                transform: translateX(0);
            }
        }

        @keyframes show {
            0% {
                opacity: 0;
                transform: scale(2);
            }

            25% {
                transform: scale(1.5);
            }

            50% {
                transform: scale(0.9);
            }

            75% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        /* =========================
           RESPONSIVE
        ========================= */

        @media (max-width: 768px) {
            .header {
                justify-content: flex-start;
                text-align: left;
                padding-left: 90px;
            }

            .heading_first {
                font-size: 20px;
                letter-spacing: 6px;
            }

            .heading_primary {
                font-size: 42px;
                letter-spacing: 14px;
            }

            .header__btn:link,
            .header__btn:visited {
                padding: 18px 55px;
            }

            .nav {
                width: 280px;
                padding-left: 35px;
            }

            .nav__link:link,
            .nav__link:visited {
                font-size: 24px;
                letter-spacing: 6px;
            }
        }
    </style>
</head>

<body>

    <input type="checkbox" id="menu-toggle">

    <!-- Nút mở / đóng menu -->
    <label for="menu-toggle" class="menu-button">
        <span class="open-icon">☰</span>
        <span class="close-icon">×</span>
    </label>

    <!-- Menu -->
    <nav class="nav">
        <ul class="nav__list">
            <li class="nav__item">
                <a href="#" class="nav__link">FEATURES</a>
            </li>

            <li class="nav__item">
                <a href="#" class="nav__link">ABOUT</a>
            </li>

            <li class="nav__item">
                <a href="#" class="nav__link">PRODUCTS</a>
            </li>

            <li class="nav__item">
                <a href="#" class="nav__link">SERVICES</a>
            </li>

            <li class="nav__item">
                <a href="#" class="nav__link">CONTACTS</a>
            </li>
        </ul>
    </nav>

    <!-- Màn hình 2 -->
    <header class="header">
        <div class="header__text-box">
            <p class="heading_first heading_first-animation">
                Over one hundred flavors of tea
            </p>

            <h1 class="heading_primary heading_primary-animation">
                SPECIALLY<br>
                CRAFTED TEA
            </h1>

            <a href="#" class="header__btn">EXPLORE</a>
        </div>
    </header>

    <!-- Màn hình 3 -->
    <section class="about">
        <div class="about_left">
            <img
                src="https://images.unsplash.com/photo-1544787219-7f47ccb76574?auto=format&fit=crop&w=1200&q=80"
                alt="About Us"
                class="about__img"
            >
        </div>
    </section>

</body>
</html>
