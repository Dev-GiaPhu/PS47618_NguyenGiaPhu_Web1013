<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>4.1-BOX</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
            Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            background: #f1f5f9;
        }

        .card {
            background: #f7f7f7;
            padding: 1.5rem 2rem;
            text-align: center;
            max-width: 300px;
            border-radius: 0.5rem;
            border: 1px solid transparent;
            margin: 3rem auto;
            transition:0.4s;
        }

        .card-1 {
            border-color: #ff69a6;

            box-shadow:
            inset 0 0px 10px #ff85b6,
            0 0px 0px #ff85b6;
        }
        .card-1:hover {
            background: #fff;
            border-color: #ff85b6;
            transform:translateY(-10px);

            box-shadow:
            inset 0 0px 0px #ff85b6,
            0 2px 10px #ff85b6;
        }

        .card-2 {
            border-color: #68a3ff;

            box-shadow:
            inset 0 0px 10px #68a3ff,
            0 0px 0px #68a3ff;
        }
        .card-2:hover {
            background: #fff;
            border-color: #8ab7ff;
            transform:translateY(-10px);
            box-shadow:
            inset 0 0px 0px #68a3ff,
            0 2px 10px #8ab7ff;
        }

        .icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 auto;
        }

        .card-1 .icon {
            background: #ff69a6;
        }

        .card-2 .icon {
            background: #68a3ff;
        }

        .title {
            text-transform: capitalize;
            letter-spacing: 2px;
        }

        .text {
            line-height: 1.5;
            color: grey;
        }

        .btn {
            text-transform: capitalize;
            border: transparent;
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            letter-spacing: 2px;
        }

        .btn-pink {
            background: #ffe8f1;
            color: #ff69a6;
            transition:0.4s;
        }
        .btn-pink:hover {
            background: #ff69a6;
            color: #ffe8f1;
        }
        .btn-blue {
            background: #ecf4ff;
            color: #68a3ff;
            transition:0.4s;
        }
        .btn-blue:hover {
            background: #68a3ff;
            color: #ecf4ff;
        }
    </style>
</head>

<body>

    <!-- first card -->
    <div class="card card-1">
        <div class="icon"></div>

        <h2 class="title">first card</h2>

        <p class="text">
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
            Velit, obcaecati.
        </p>

        <button class="btn btn-pink">sign in</button>
    </div>
    <!-- end of first card -->

    <!-- second card -->
    <div class="card card-2">
        <div class="icon"></div>

        <h2 class="title">second card</h2>

        <p class="text">
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
            Velit, obcaecati.
        </p>

        <button class="btn btn-blue">sign in</button>
    </div>
    <!-- end of second card -->

</body>
</html>
