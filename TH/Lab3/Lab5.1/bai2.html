<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 2 - Ứng dụng Position</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .header {
            width: 100%;
            height: 110px;
            background: #1b1b1b;

            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .logo {
            position: absolute;
            top: 35px;
            left: 50px;

            color: white;
            font-size: 32px;
            letter-spacing: 8px;
            font-weight: bold;
        }

        .hero {
            height: 520px;
            margin-top: 110px;

            background-image:
                linear-gradient(rgba(95, 55, 15, 0.75), rgba(95, 55, 15, 0.75)),
                url("https://images.unsplash.com/photo-1447933601403-0c6688de566e?auto=format&fit=crop&w=1600&q=80");

            background-size: cover;
            background-position: center;

            position: relative;
        }

        .hero-content {
            width: 70%;

            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);

            text-align: center;
            color: white;
        }

        .hero-content h1 {
            font-size: 42px;
            letter-spacing: 8px;
            margin-bottom: 25px;
        }

        .hero-content p {
            font-size: 22px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .btn {
            display: inline-block;
            padding: 18px 45px;
            border: 2px solid white;

            color: white;
            text-decoration: none;
            font-size: 18px;
            letter-spacing: 8px;
            font-weight: bold;
        }

        .btn:hover {
            background: white;
            color: #333;
        }

        .red-box {
            height: 180px;
            background: #48290c;
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="logo">KOFI</div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Coffee Market</h1>

            <p>
                Lorem, ipsum dolor sit amet consectetur adipisicing elit.
                Rerum quidem possimus magni labore accusamus hic inventore provident,
                beatae iure ducimus?
            </p>

            <a href="#" class="btn">EXPLORE MORE</a>
        </div>
    </section>

    <div class="red-box"></div>

</body>
</html>
