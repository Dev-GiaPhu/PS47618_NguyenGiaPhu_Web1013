<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 1 - Ứng dụng Display</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f1f3f7;
        }

        .section {
            width: 100%;
            min-height: 450px;
            background: white;
            padding-top: 110px;
        }

        .section-title {
            text-align: center;
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .underline {
            display: block;
            width: 120px;
            height: 5px;
            background: royalblue;
            margin: 0 auto 45px auto;
        }

        .text-box {
            width: 70%;
            max-width: 800px;
            margin: 0 auto;
            font-size: 24px;
            line-height: 1.5;
        }

        .bottom {
            height: 300px;
            background: #eef0f5;
        }
    </style>
</head>

<body>

    <section class="section">
        <h1 class="section-title">Section Title</h1>

        <span class="underline"></span>

        <div class="text-box">
            <p>
                Lorem ipsum dolor sit amet consectetur adipisicing elit.
                Tempora nulla, reprehenderit sapiente aperiam nesciunt ab officia pariatur?
                Modi necessitatibus at, nostrum repellendus voluptate eveniet ad,
                pariatur iusto voluptates natus adipisci!
            </p>
        </div>
    </section>

    <div class="bottom"></div>

</body>
</html>
