<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài 2 - Form đăng ký</title>
</head>
<body>
    <form action="#" method="post" enctype="multipart/form-data">
        <label for="hoten"><b>Họ và tên:</b></label><br>
        <input type="text" id="hoten" name="hoten" style="width: 350px;"><br><br>

        <b>Giới tính:</b>
        <input type="radio" id="nam" name="gioitinh" value="Nam" checked>
        <label for="nam">Nam</label>
        <input type="radio" id="nu" name="gioitinh" value="Nữ">
        <label for="nu">Nữ</label><br><br>

        <label for="hinhanh"><b>Hình ảnh:</b></label><br>
        <input type="file" id="hinhanh" name="hinhanh"><br><br>

        <label for="quoctich"><b>Quốc tịch:</b></label><br>
        <select id="quoctich" name="quoctich" style="width: 350px;">
            <option value="United States">United States</option>
            <option value="Viet Nam" selected>Việt Nam</option>
            <option value="Japan">Japan</option>
            <option value="Korea">Korea</option>
        </select><br><br>

        <b>Sở thích:</b><br>
        <input type="checkbox" id="thethao" name="sothich" value="Thể thao">
        <label for="thethao">Thể thao</label>
        <input type="checkbox" id="dulich" name="sothich" value="Du lịch" checked>
        <label for="dulich">Du lịch</label>
        <input type="checkbox" id="amnhac" name="sothich" value="Âm nhạc">
        <label for="amnhac">Âm nhạc</label>
        <input type="checkbox" id="amthuc" name="sothich" value="Ẩm thực">
        <label for="amthuc">Ẩm thực</label><br><br>

        <label for="ghichu"><b>Ghi chú:</b></label><br>
        <textarea id="ghichu" name="ghichu" rows="4" cols="45"></textarea>

        <hr>
        <input type="submit" value="Đăng ký">
        <input type="reset" value="Nhập lại">
    </form>
</body>
</html>
