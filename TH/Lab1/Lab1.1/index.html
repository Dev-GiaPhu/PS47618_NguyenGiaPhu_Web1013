    </div>

    <script>
        // Nội dung code được lưu trực tiếp vào đây để không bị lỗi bảo mật trình duyệt
        const sourceCodes = {
            thotim: `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài thơ</title>
</head>
<body>
    <h1>Bài thơ</h1>
    <br>
    <i>
        <p>Màu <b>tím</b> hoa sim màu <b>tím</b> nhớ</p>
        <p>Màu <b>tím</b> lòng người <b>tím</b> ước mơ</p>
        <p>Ôi <b>tím</b> thuỷ chung màu đẹp quá</p>
        <p>Màu <b>tím</b> chiều tà tím ý thơ</p>
        <br>
        <p>Màu <b>tím</b> hoa sim tim <b>tím</b> <mark>Huế</mark></p>
        <p>Bầu trời tim <b>tím</b> <b>tím</b> tim tôi</p>
    </i>
</body>
</html>`,
            phuongtrinh: `<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FPT Polytechnic</title>
</head>
<body>
    <h1>Phương trình</h1>

    <h2>
        a<sub>0</sub>x<sup>N</sup> + a<sub>1</sub>x<sup>N+1</sup> + ... + a<sub>N</sub>x<sup>0</sup> = 0
    </h2>
</body>
</html>`,
            about: `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
</head>
<body>
    <h2>TEA STATION</h2>

    <p>
        Once upon a time we only had a couple of teapots and enjoyed tea only 
        with our family. Over time, we were able to afford to buy a small tea 
        plantation
    </p>

    <p>
        Now we have a whole teahouse and we delight many people with delicious 
        and hot tea. We serve black long tea, relaxing green and jasmine tea, tea 
        with spices and many others.
    </p>
</body> 
</html>`,
            feature: `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Features - Tea Station</title>
</head>
<body>

    <h4>Made with love</h4>
    <p>Our tea is made with love, from the collection of the leaves to the brewing.</p>

    <h4>Relaxation</h4>
    <p>Set aside anxiety and relax after a hard day with a cup of hot tea in your hands.</p>

    <h4>Energy</h4>
    <p>Our tea will energize you with vitamins and invigorate the rest of the day.</p>

    <h4>Family recipe</h4>
    <p>All our recipes are passed down from generation to generation for a long time.</p>

</body>
</html>`,
            product: `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Products - Tea Station</title>
</head>
<body>

    <h2>OUR PRODUCTS</h2>

    <p>
        Our assortment includes long tea, relaxing and invigorating green tea with 
        spices, lemon juice, jasmine, cinnamon and anise, milk tea and many 
        others.
    </p>

</body>
</html>`
        };

        function openCode(id) {
            const code = sourceCodes[id];
            const newTab = window.open("", "_blank");
            newTab.document.write("<html><head><title>Source Code</title></head><body style='background:#2d2d2d; color:#ccc; padding:20px;'>");
            newTab.document.write("<h2>Mã nguồn:</h2><hr>");
            newTab.document.write("<pre style='white-space:pre-wrap; font-family:monospace; font-size:14px;'>" + 
                code.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") + 
                "</pre>");
            newTab.document.write("</body></html>");
            newTab.document.close();
        }
    </script>

</body>
</html>
